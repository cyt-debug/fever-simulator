<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>體溫量度模擬器 (CVI加粗+鍵盤雙觸發版)</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            background-color: #000000; /* 純黑背景 */
        }

        /* 畫面一：主畫面 */
        #screen1 {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* 提示字句 */
        .instruction {
            font-size: 3.5rem;
            color: #ffffff; 
            margin-bottom: 3rem;
            font-weight: bold;
            text-align: center;
            letter-spacing: 2px;
        }

        /* 額溫槍目標區域 */
        .target-area {
            position: relative;
            width: 440px;
            height: 440px;
            background-color: #000000; 
            border: 8px solid #333333; 
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            overflow: hidden; 
            transition: transform 0.2s, border-color 0.3s;
        }

        .target-area:hover {
            transform: scale(1.05);
            border-color: #555555;
        }

        /* 額溫槍圖片 */
        .thermometer-img {
            height: 110%; 
            width: auto;
            object-fit: contain;
            pointer-events: none; 
        }

        /* 進度條外框 */
        .progress-ring {
            position: absolute;
            top: -8px;
            left: -8px;
            width: 440px;
            height: 440px;
            z-index: 10;
            pointer-events: none;
        }
        
        /* 螢光黃注視圈（保持 0.5cm 粗度） */
        .progress-ring circle {
            fill: transparent;
            stroke: #ffff00;        
            stroke-width: 0.5cm;    
            stroke-dasharray: 1257; 
            stroke-dashoffset: 1257;
            stroke-linecap: round;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        /* 注視動畫觸發 */
        .target-area:hover .progress-ring circle {
            animation: countdown 1s linear forwards;
        }

        @keyframes countdown {
            from { stroke-dashoffset: 1257; }
            to { stroke-dashoffset: 0; }
        }

        /* 畫面二：發燒畫面 */
        #screen2 {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #ff0000; 
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            z-index: 999;
        }

        .fever-text {
            font-size: 6rem;
            font-weight: bold;
            margin-bottom: 2rem;
            background-color: #000000;
            color: #ffff00; 
            padding: 10px 70px;
            border-radius: 20px;
            border: 6px solid #ffffff;
        }

        .result-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5rem;
        }

        .temperature {
            font-size: 11rem;
            font-weight: 900;
            margin: 0;
            color: #ffffff;
            text-shadow: 0 5px 20px rgba(0,0,0,0.9);
        }

        .reset-btn {
            margin-top: 4rem;
            padding: 25px 80px;
            font-size: 3rem;
            background-color: #000000;
            color: #ffffff;
            border: 6px solid #ffffff;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .reset-btn:hover {
            background-color: #222222;
            color: #ffff00;
            border-color: #ffff00;
        }
    </style>
</head>
<body>

    <div id="screen1">
        <div class="instruction">👁️ 請望住額溫槍 或 按[空白鍵]開始量度</div>
        <div class="target-area" id="thermometerTarget">
            <svg class="progress-ring">
                <circle cx="220" cy="220" r="200"></circle>
            </svg>
            
            <img src="thermometer.png" class="thermometer-img" alt="額溫槍">
        </div>
    </div>

    <div id="screen2">
        <div class="fever-text">發燒</div>
        
        <div class="result-container">
            <div class="temperature">38.0°C</div>
            
            <svg width="300" height="300" viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="85" fill="#ffb3c1" stroke="#ffffff" stroke-width="8"/>
                <path d="M55 90 Q70 102 80 95" fill="none" stroke="#000000" stroke-width="8" stroke-linecap="round"/>
                <path d="M145 90 Q130 102 120 95" fill="none" stroke="#000000" stroke-width="8" stroke-linecap="round"/>
                <path d="M50 70 Q70 63 85 78" fill="none" stroke="#000000" stroke-width="7" stroke-linecap="round"/>
                <path d="M150 70 Q130 63 115 78" fill="none" stroke="#000000" stroke-width="7" stroke-linecap="round"/>
                <path d="M70 145 Q100 120 130 145" fill="none" stroke="#000000" stroke-width="8" stroke-linecap="round"/>
                <circle cx="45" cy="115" r="20" fill="#ff0055" opacity="0.8"/>
                <circle cx="155" cy="115" r="20" fill="#ff0055" opacity="0.8"/>
                <rect x="50" y="25" width="100" height="36" rx="8" fill="#0055ff" stroke="#ffffff" stroke-width="4"/>
                <rect x="58" y="31" width="84" height="24" rx="4" fill="#66ccff" />
                <path d="M35 75 C30 85 43 90 35 100 C32 95 32 85 35 75 Z" fill="#00ffff" stroke="#000000" stroke-width="2"/>
                <path d="M165 75 C160 85 173 90 165 100 C162 95 162 85 165 75 Z" fill="#00ffff" stroke="#000000" stroke-width="2"/>
            </svg>
        </div>

        <button class="reset-btn" id="resetBtn">重新量度</button>
    </div>

    <script>
        const thermometerTarget = document.getElementById('thermometerTarget');
        const screen1 = document.getElementById('screen1');
        const screen2 = document.getElementById('screen2');
        const resetBtn = document.getElementById('resetBtn');
        
        let hoverTimer = null;
        let isTriggered = false;

        function unlockAudio() {
            if (window.AudioContext || window.webkitAudioContext) {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                ctx.resume();
            }
        }

        function playBeepSound() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            
            const audioCtx = new AudioContext();
            let startTime = audioCtx.currentTime;
            
            const beepLength = 0.15; 
            const gap = 0.1;        
            
            for (let i = 0; i < 3; i++) {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.type = 'sine'; 
                oscillator.frequency.setValueAtTime(800, startTime); 
                
                gainNode.gain.setValueAtTime(0, startTime);
                gainNode.gain.linearRampToValueAtTime(0.35, startTime + 0.02); 
                gainNode.gain.setValueAtTime(0.35, startTime + beepLength - 0.02);
                gainNode.gain.linearRampToValueAtTime(0, startTime + beepLength);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.start(startTime);
                oscillator.stop(startTime + beepLength);
                
                startTime += beepLength + gap;
            }
        }

        function speakFever() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                
                const utterance = new SpeechSynthesisUtterance("發燒呀");
                utterance.lang = 'zh-HK'; 
                utterance.rate = 0.7;    
                utterance.pitch = 1.0;   
                
                window.speechSynthesis.speak(utterance);
            }
        }

        function triggerFeverScreen() {
            if (isTriggered) return;
            isTriggered = true;
            
            screen1.style.display = 'none';
            screen2.style.display = 'flex';
            document.body.style.backgroundColor = '#ff0000'; 
            
            playBeepSound();
            
            setTimeout(() => {
                speakFever();
            }, 600);
        }

        // --- 🆕 新增：鍵盤監聽功能 (支援空白鍵) ---
        window.addEventListener('keydown', (event) => {
            // 檢查是否按下空白鍵 (Key: ' ' 或 Code: 'Space')
            if (event.key === ' ' || event.code === 'Space') {
                event.preventDefault(); // 阻止空白鍵捲動網頁的預設行為
                
                if (!isTriggered) {
                    unlockAudio();
                    triggerFeverScreen(); // 瞬間觸發發燒畫面
                }
            }
        });

        // --- 眼動儀 / 滑鼠事件 ---
        thermometerTarget.addEventListener('mouseenter', () => {
            if (isTriggered) return;
            unlockAudio();
            
            hoverTimer = setTimeout(() => {
                triggerFeverScreen();
            }, 1000); 
        });

        thermometerTarget.addEventListener('mouseleave', () => {
            if (isTriggered) return;
            clearTimeout(hoverTimer);
        });

        thermometerTarget.addEventListener('click', () => {
            unlockAudio();
            triggerFeverScreen();
        });

        // 重置按鈕
        resetBtn.addEventListener('click', () => {
            isTriggered = false;
            screen2.style.display = 'none';
            screen1.style.display = 'flex';
            document.body.style.backgroundColor = '#000000';
            
            const circle = document.querySelector('.progress-ring circle');
            circle.style.animation = 'none';
            setTimeout(() => { circle.style.animation = ''; }, 10);
        });
    </script>
</body>
</html>
